name: tomcat_deploy
on:
- push
jobs:
  build_job:
    runs-on: ubuntu-latest
    steps:

    - name: checkout the code
      uses: actions/checkout@v6

    - name: listing the code
      run: ls
    
    - name: installing java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: building the code
      run: |
        mvn clean package
    
    - name: listing the code
      run: ls -lR

    - name: upload the artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-artifact
        path: ./target/*.war

  deploy_job:
    needs: 
    - build_job
    runs-on: ubuntu-latest
    steps:

    - name: downloding the artifact
      uses: actions/download-artifact@v8
      with:
        name: my-artifact
        path: /opt/target/
    
    - name: Listing the artifact
      run: ls -l /opt

    - name: upload to s3
      uses: shallwefootball/s3-upload-action@master
      with:
        aws_key_id: ${{ secrets.ACCESS_KEY_ID }}
        aws_secret_access_key: ${{ secrets.SECRET_ACCESS_KEY}}
        aws_bucket: ${{ vars.BUCKET_NAME}}
        source_dir: /opt/target
        destination_dir: /app


