name: tomcat_deploy
on:
- workflow_dispatch
jobs:
  first_job:
    runs-on: ubuntu-latest

    steps:

    - name: checkout the code
      uses: actions/checkout@v6

    - name: listing the code
      run: ls
    
    - name: installing java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: building the code
      run: |
        mvn clean package
    
    - name: listing the code
      run: ls -lR