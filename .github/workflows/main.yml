name: tomcat_deploy
on:
- push
jobs:
  build_job:
    runs-on: ubuntu-latest
    steps:

    - name: checkout the code
      uses: actions/checkout@v6

    - name: listing the code
      run: ls
    
    - name: installing java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: building the code
      run: |
        mvn clean package
    
    - name: listing the code
      run: ls -lR

    - name: upload the artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-artifact
        path: ./target/*.war

  deploy_job:
    runs-on: ubuntu-latest
    steps:

    - name: downloding the artifact
      uses: actions/download-artifact@v8
      with:
        name: my-artifact
        path: /opt/
    
    - name: Listing the artifact
      run: ls -lR /opt
      
