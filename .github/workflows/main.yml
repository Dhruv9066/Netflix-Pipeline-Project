name: tomcat_deploy
on:
- push
jobs:
  first_job:
    runs-on: ubuntu-latest

    steps:

    - name: checkout the code
      uses: actions/checkout@v6

    - name: listing the code
      run: ls
    
    - name: installing java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: building the code
      run: |
        mvn clean package
    
    - name: listing the code
      run: ls -lR

    - name: deploying to tomcat
      run: |
        curl -u admin:admin --upload-file ./target/*.war "http://100.55.169.24:8080/manager/text/deploy?path=/myapp&update=true"